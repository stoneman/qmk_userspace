<svg width="1012" height="560" viewBox="0 0 1012 560" class="keymap" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>/* inherit to force styles through use tags */
svg path {
    fill: inherit;
}

/* font and background color specifications */
svg.keymap {
    font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;
    font-size: 14px;
    font-kerning: normal;
    text-rendering: optimizeLegibility;
    fill: #24292e;
}

/* default key styling */
rect.key {
    fill: #f6f8fa;
}

rect.key, rect.combo {
    stroke: #c9cccf;
    stroke-width: 1;
}

/* default key side styling, only used is draw_key_sides is set */
rect.side {
    filter: brightness(90%);
}

/* color accent for combo boxes */
rect.combo, rect.combo-separate {
    fill: #cdf;
}

/* color accent for held keys */
rect.held, rect.combo.held {
    fill: #fdd;
}

/* color accent for ghost (optional) keys */
rect.ghost, rect.combo.ghost {
    stroke-dasharray: 4, 4;
    stroke-width: 2;
}

text {
    text-anchor: middle;
    dominant-baseline: middle;
}

/* styling for layer labels */
text.label {
    font-weight: bold;
    text-anchor: start;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for optional footer */
text.footer {
    text-anchor: end;
    dominant-baseline: auto;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for combo tap, and key non-tap label text */
text.combo, text.hold, text.shifted, text.left, text.right, text.tl, text.tr, text.bl, text.br {
    font-size: 11px;
}

text.hold, text.bl, text.br {
    text-anchor: middle;
    dominant-baseline: auto;
}

text.shifted, text.tl, text.tr {
    text-anchor: middle;
    dominant-baseline: hanging;
}

text.left, text.tl, text.bl {
    text-anchor: start;
}

text.right, text.tr, text.br {
    text-anchor: end;
}

text.layer-activator {
    text-decoration: underline;
}

/* styling for hold/shifted label text in combo box */
text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right {
    font-size: 8px;
}

/* lighter symbol for transparent keys */
text.trans {
    fill: #7b7e81;
}

/* styling for combo dendrons */
path.combo {
    stroke-width: 1;
    stroke: gray;
    fill: none;
}

/* Start Tabler Icons Cleanup */
/* cannot use height/width with glyphs */
.icon-tabler > path {
    fill: inherit;
    stroke: inherit;
    stroke-width: 2;
}
/* hide tabler's default box */
.icon-tabler > path[stroke="none"][fill="none"] {
    visibility: hidden;
}
/* End Tabler Icons Cleanup */

svg.keymap { fill: #d1d6db; }
rect.key { fill: #3f4750; }
rect.key, rect.combo { stroke: #60666c; }
rect.combo, rect.combo-separate { fill: #1f3d7a; }
rect.held, rect.combo.held { fill: #854747; }
text.label, text.footer { stroke: black; }
text.trans { fill: #7e8184; }
path.combo { stroke: #7f7f7f; }

rect.key.mod    { fill: rgba(255, 184, 108, 0.45); }  /* orange — modifiers */
rect.key.layer  { fill: rgba(139, 233, 253, 0.45); }  /* cyan   — layer switches */
rect.key.macro  { fill: rgba(189, 147, 249, 0.40); }  /* purple — macros */
rect.key.emoji  { fill: rgba(255, 121, 198, 0.35); }  /* pink   — emoji */
rect.key.nav    { fill: rgba(80,  250, 123, 0.35); }  /* green  — navigation/window mgmt */
rect.key.debug  { fill: rgba(80,  250, 123, 0.35); }  /* green  — debugger (layer 2) */
rect.key.media  { fill: rgba(255, 85,  85,  0.65); }  /* red    — media */
rect.key.system { fill: rgba(241, 250, 140, 0.45); }  /* yellow — system / boot */
/* Inherited (transparent) keys: darker grey than normal keys + faded
   text so it's clear they fall through to the base layer. */
rect.key.trans  { fill: #1c2128; }
.key.trans text { opacity: 0.55; }
</style>
